apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-consumer
  namespace: qm2026
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-consumer
  template:
    metadata:
      labels:
        app: go-consumer
    spec:
      containers:
      - name: go-consumer
        image: gcr.io/sopes1-p2-201407049/go-consumer:latest
        env:
        - name: RABBITMQ_URL
          value: "amqp://guest:guest@rabbitmq:5672/"
        - name: VALKEY_URL
          value: "valkey-service:6379"
        - name: ASSIGNED_TEAM
          value: "ESP"
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
