apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-api
  namespace: qm2026
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rust-api
  template:
    metadata:
      labels:
        app: rust-api
    spec:
      containers:
      - name: rust-api
        image: ZOT_IP:5000/rust-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: GO_CLIENT_URL
          value: "http://go-client:8080"
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: rust-api
  namespace: qm2026
spec:
  selector:
    app: rust-api
  ports:
  - port: 8080
    targetPort: 8080
