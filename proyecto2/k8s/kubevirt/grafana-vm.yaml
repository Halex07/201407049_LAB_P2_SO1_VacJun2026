apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: grafana-vm
  namespace: qm2026
spec:
  running: true
  template:
    metadata:
      labels:
        app: grafana-vm
    spec:
      domain:
        cpu:
          cores: 2
        memory:
          guest: 2Gi
        devices:
          disks:
          - name: containerdisk
            disk:
              bus: virtio
          - name: cloudinitdisk
            disk:
              bus: virtio
      volumes:
      - name: containerdisk
        containerDisk:
          image: kubevirt/fedora-cloud-container-disk-demo:latest
      - name: cloudinitdisk
        cloudInitNoCloud:
          userData: |
            #cloud-config
            password: fedora
            chpasswd: { expire: False }
            runcmd:
              # Instalar containerd
              - dnf install -y containerd
              - systemctl enable containerd
              - systemctl start containerd
              # Correr Grafana con containerd (ctr)
              - ctr image pull docker.io/grafana/grafana:latest
              - ctr run -d --net-host docker.io/grafana/grafana:latest grafana-container
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: qm2026
spec:
  selector:
    app: grafana-vm
  ports:
  - port: 3000
    targetPort: 3000
  type: LoadBalancer
