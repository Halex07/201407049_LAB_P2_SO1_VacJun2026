apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: valkey-vm
  namespace: qm2026
spec:
  running: true
  template:
    metadata:
      labels:
        app: valkey-vm
    spec:
      domain:
        cpu:
          cores: 2
        memory:
          guest: 2Gi
        devices:
          disks:
          - name: containerdisk
            disk:
              bus: virtio
          - name: cloudinitdisk
            disk:
              bus: virtio
      volumes:
      - name: containerdisk
        containerDisk:
          image: kubevirt/fedora-cloud-container-disk-demo:latest
      - name: cloudinitdisk
        cloudInitNoCloud:
          userData: |
            #cloud-config
            password: fedora
            chpasswd: { expire: False }
            runcmd:
              # Instalar containerd
              - dnf install -y containerd
              - systemctl enable containerd
              - systemctl start containerd
              # Correr Valkey con containerd (ctr)
              - ctr image pull docker.io/valkey/valkey:latest
              - ctr run -d --net-host docker.io/valkey/valkey:latest valkey-container
---
apiVersion: v1
kind: Service
metadata:
  name: valkey-service
  namespace: qm2026
spec:
  selector:
    app: valkey-vm
  ports:
  - port: 6379
    targetPort: 6379
